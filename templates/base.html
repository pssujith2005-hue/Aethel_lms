<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aethel.ai{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800">

    <aside class="fixed top-0 left-0 h-screen w-64 bg-white border-r border-slate-200 z-50 hidden lg:flex flex-col">
        <div class="p-8">
            <span class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Aethel.ai</span>
        </div>
        
        <nav class="flex-grow px-4 space-y-1.5">
            <a href="{% url 'dashboard' %}" class="flex items-center space-x-3.5 px-4 py-3 rounded-xl font-medium text-sm group transition-all duration-200 {% if active_nav == 'dashboard' %} bg-blue-50 text-blue-600 shadow-sm {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 {% endif %}">
                <i class="fa-solid fa-house text-base {% if active_nav == 'dashboard' %} text-blue-600 {% else %} text-slate-400 group-hover:text-slate-600 {% endif %}"></i> <span>Dashboard</span>
            </a>
            <a href="{% url 'courses' %}" class="flex items-center space-x-3.5 px-4 py-3 rounded-xl font-medium text-sm group transition-all duration-200 {% if active_nav == 'courses' %} bg-blue-50 text-blue-600 shadow-sm {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 {% endif %}">
                <i class="fa-solid fa-book-open text-base {% if active_nav == 'courses' %} text-blue-600 {% else %} text-slate-400 group-hover:text-slate-600 {% endif %}"></i> <span>My Courses</span>
            </a>
            <a href="{% url 'ai_lab' %}" class="flex items-center space-x-3.5 px-4 py-3 rounded-xl font-medium text-sm group transition-all duration-200 {% if active_nav == 'ai_lab' %} bg-blue-50 text-blue-600 shadow-sm {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 {% endif %}">
                <i class="fa-solid fa-bolt text-base {% if active_nav == 'ai_lab' %} text-blue-600 {% else %} text-slate-400 group-hover:text-slate-600 {% endif %}"></i> <span>AI Lab</span>
            </a>
            <a href="{% url 'analytics' %}" class="flex items-center space-x-3.5 px-4 py-3 rounded-xl font-medium text-sm group transition-all duration-200 {% if active_nav == 'analytics' %} bg-blue-50 text-blue-600 shadow-sm {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 {% endif %}">
                <i class="fa-solid fa-chart-line text-base {% if active_nav == 'analytics' %} text-blue-600 {% else %} text-slate-400 group-hover:text-slate-600 {% endif %}"></i> <span>Analytics</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <a href="{% url 'landing' %}" class="flex items-center space-x-3 text-red-500 hover:bg-red-50 p-3 rounded-xl transition-all font-medium text-sm">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span>
            </a>
        </div>
    </aside>

    <main class="lg:ml-64 min-h-screen">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 h-16 flex items-center justify-between px-8">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Aethel AI Ecosystem</h2>
            <div class="flex items-center space-x-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-slate-900">Student User</p>
                    <p class="text-xs text-blue-600 font-medium">Premium Tier</p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md shadow-blue-100">
                    S
                </div>
            </div>
        </header>

        <div class="p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
